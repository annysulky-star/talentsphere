<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentSphere - Talent Showcase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Auth Forms */
        .auth-box {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .form-card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .form-card h2 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .toggle {
            text-align: center;
            margin-top: 15px;
            color: #666;
            cursor: pointer;
        }
        
        .toggle span {
            color: #667eea;
            font-weight: bold;
        }
        
        /* Dashboard */
        .dashboard {
            display: none;
        }
        
        .header {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .user-panel {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .profile-btn {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        
        .logout-btn {
            background: #dc3545;
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            border: none;
            width: auto;
        }
        
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .filter-btn {
            background: white;
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            width: auto;
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .creators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .creator-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .creator-card:hover {
            transform: translateY(-5px);
        }
        
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card-header i {
            font-size: 50px;
            color: white;
        }
        
        .card-body {
            padding: 20px;
        }
        
        .card-body h3 {
            margin-bottom: 5px;
            color: #333;
        }
        
        .talent-tag {
            display: inline-block;
            padding: 3px 10px;
            background: #f0f0f0;
            border-radius: 15px;
            font-size: 12px;
            margin: 10px 0;
        }
        
        .bio-text {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 18px;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            z-index: 1000;
        }
        
        @media (max-width: 768px) {
            .creators-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div id="authContainer">
    <div class="auth-box">
        <div id="loginForm" class="form-card">
            <h2>✨ TalentSphere</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button onclick="handleLogin()">Login</button>
            <div class="toggle" onclick="showSignup()">New? <span>Create Account</span></div>
        </div>
        
        <div id="signupForm" class="form-card" style="display:none">
            <h2>✨ Join TalentSphere</h2>
            <input type="text" id="signupName" placeholder="Full Name">
            <input type="email" id="signupEmail" placeholder="Email">
            <input type="password" id="signupPassword" placeholder="Password">
            <select id="signupTalent">
                <option value="Dancer">Dancer</option>
                <option value="Acrobatics">Acrobatics</option>
                <option value="Artist">Artist</option>
                <option value="Sports">Sports</option>
                <option value="Musician">Musician</option>
                <option value="Magician">Magician</option>
                <option value="Comedian">Comedian</option>
            </select>
            <button onclick="handleSignup()">Sign Up</button>
            <div class="toggle" onclick="showLogin()">Back to Login</div>
        </div>
    </div>
</div>

<div id="dashboard" class="dashboard">
    <div class="container">
        <div class="header">
            <div class="logo">🎭 TalentSphere</div>
            <div class="user-panel">
                <div class="profile-btn" onclick="showProfile()">
                    👤 <span id="userName">User</span>
                </div>
                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            </div>
        </div>
        
        <div class="filters" id="filters">
            <button class="filter-btn active" onclick="filterCreators('all')">All</button>
            <button class="filter-btn" onclick="filterCreators('Dancer')">Dancers</button>
            <button class="filter-btn" onclick="filterCreators('Acrobatics')">Acrobatics</button>
            <button class="filter-btn" onclick="filterCreators('Artist')">Artists</button>
            <button class="filter-btn" onclick="filterCreators('Sports')">Sports</button>
            <button class="filter-btn" onclick="filterCreators('Musician')">Musicians</button>
        </div>
        
        <div id="creatorsGrid" class="creators-grid">
            <div class="loading">Loading creators...</div>
        </div>
    </div>
</div>

<script>
    let currentUser = null;
    let currentFilter = 'all';
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    async function apiCall(url, options = {}) {
        const response = await fetch(url, options);
        const data = await response.json();
        if (!response.ok) throw new Error(data.error);
        return data;
    }
    
    async function loadCreators() {
        try {
            const url = currentFilter === 'all' ? '/api/creators' : `/api/creators?talent=${currentFilter}`;
            const creators = await apiCall(url);
            const grid = document.getElementById('creatorsGrid');
            
            if (creators.length === 0) {
                grid.innerHTML = '<div class="loading">No creators found</div>';
                return;
            }
            
            grid.innerHTML = creators.map(creator => `
                <div class="creator-card" onclick="viewCreator('${creator.id}')">
                    <div class="card-header">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="card-body">
                        <h3>${creator.name}</h3>
                        <span class="talent-tag">${creator.talentType}</span>
                        <div class="bio-text">${creator.bio || 'Amazing talent!'}</div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            showToast('Error loading creators');
        }
    }
    
    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
            showToast('Please fill all fields');
            return;
        }
        
        try {
            const data = await apiCall('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            
            currentUser = data.user;
            localStorage.setItem('user', JSON.stringify(currentUser));
            showDashboard();
            showToast('Welcome back!');
        } catch (error) {
            showToast('Invalid credentials');
        }
    }
    
    async function handleSignup() {
        const name = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const talentType = document.getElementById('signupTalent').value;
        
        if (!name || !email || !password) {
            showToast('Please fill all fields');
            return;
        }
        
        try {
            const data = await apiCall('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, talentType })
            });
            
            currentUser = data.user;
            localStorage.setItem('user', JSON.stringify(currentUser));
            showDashboard();
            showToast('Account created!');
        } catch (error) {
            showToast('Email already exists');
        }
    }
    
    function showDashboard() {
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('userName').textContent = currentUser.name;
        loadCreators();
    }
    
    function showAuth() {
        document.getElementById('authContainer').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
    }
    
    function handleLogout() {
        localStorage.removeItem('user');
        currentUser = null;
        showAuth();
        showToast('Logged out');
    }
    
    function showProfile() {
        if (currentUser) {
            alert(`👤 Profile\nName: ${currentUser.name}\nTalent: ${currentUser.talentType}\nEmail: ${currentUser.email}\n\n${currentUser.bio || 'Share your talent!'}`);
        }
    }
    
    async function viewCreator(creatorId) {
        try {
            const creator = await apiCall(`/api/creator/${creatorId}`);
            alert(`✨ ${creator.name}\n🎭 ${creator.talentType}\n📝 ${creator.bio}\n\nClick to interact!`);
        } catch (error) {
            showToast('Error loading profile');
        }
    }
    
    function filterCreators(talent) {
        currentFilter = talent;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        loadCreators();
    }
    
    function showSignup() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('signupForm').style.display = 'block';
    }
    
    function showLogin() {
        document.getElementById('signupForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
    }
    
    // Check saved user
    const savedUser = localStorage.getItem('user');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        showDashboard();
    } else {
        showAuth();
    }
</script>
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</body>
</html>
